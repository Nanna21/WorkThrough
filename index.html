<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth UI</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}
body {
  height: 100vh;
  display: flex;
  background: #0b0b0d;
  color: white;
}
/* LEFT */
.left {
  flex: 1;
  position: relative;
  padding: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
  background:
    linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px),
    linear-gradient(60deg, rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(120deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  background-color: #0b0b0d;
}
.left h1 {
  font-size: 64px;
  font-weight: 800;
}
.left p {
  margin-top: 20px;
  font-size: 22px;
  color: #cfcfcf;
}
/* RIGHT */
.right {
  width: 480px;
  display: flex;
  justify-content: center;
  align-items: center;
}
.card {
  width: 100%;
  background: #e9e9eb;
  border-radius: 20px;
  padding: 40px;
  color: #333;
}
.icon {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 2px solid #333;
  margin: 0 auto 10px;
}
.title {
  text-align: center;
  margin-bottom: 25px;
  font-size: 14px;
  text-transform: uppercase;
  font-weight: bold;
  color: #555;
}
.input-group {
  margin-bottom: 15px;
}
.input-group label {
  font-size: 13px;
  display: block;
  margin-bottom: 5px;
}
.input-group input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #dcdcdc;
  outline: none;
}
.input-group input:focus {
  background: #d0d0d0;
}
.options {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-bottom: 20px;
}
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #6c83e6;
  color: white;
  font-size: 16px;
  cursor: pointer;
  font-weight: bold;
}
.btn:hover {
  background: #5a71d1;
}
.divider {
  text-align: center;
  margin: 20px 0;
  font-size: 12px;
  color: #777;
}
.google {
  width: 100%;
  padding: 12px;
  border-radius: 20px;
  border: none;
  background: #f3f3f3;
  cursor: pointer;
}
.footer {
  text-align: center;
  font-size: 12px;
  margin-top: 15px;
}
.footer a {
  color: #6c83e6;
  text-decoration: none;
  cursor: pointer;
  font-weight: bold;
}
.hidden {
  display: none !important;
}
</style>
</head>
<body>

<div class="left">
  <h1>WorkThrough</h1>
  <p>We make your workflow<br>simple and efficient</p>
</div>

<div class="right">
  <div class="card">
    <form id="login" onsubmit="handleLogin(event)">
      <div class="icon"></div>
      <div class="title">account login</div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="loginEmail" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="loginPassword" required>
      </div>
      <div class="options">
        <span><input type="checkbox"> Remember</span>
        <span>Forgot?</span>
      </div>
      <button type="submit" class="btn">Login</button>
      <div class="divider">or</div>
      <button type="button" class="google" onclick="alert('구글 로그인 연동이 필요합니다.')">Google</button>
      <div class="footer">
        No account? <a onclick="toggle()">Sign up</a>
      </div>
    </form>

    <form id="signup" class="hidden" onsubmit="handleSignUp(event)">
      <div class="icon"></div>
      <div class="title">create account</div>
      <div class="input-group">
        <label>Name</label>
        <input type="text" id="signupName" required>
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="signupEmail" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="signupPassword" required>
      </div>
      <button type="submit" class="btn">Sign Up</button>
      <div class="footer">
        Already have one? <a onclick="toggle()">Login</a>
      </div>
    </form>
  </div>
</div>

<script>
function toggle() {
  const loginForm = document.getElementById('login');
  const signupForm = document.getElementById('signup');
  loginForm.reset();
  signupForm.reset();
  loginForm.classList.toggle('hidden');
  signupForm.classList.toggle('hidden');
}

function handleSignUp(event) {
  event.preventDefault();
  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;

  let users = JSON.parse(localStorage.getItem('users')) || [];
  const isExist = users.some(user => user.email === email);
  if (isExist) {
    alert('이미 등록된 이메일입니다.');
    return;
  }

  users.push({ name, email, password });
  localStorage.setItem('users', JSON.stringify(users));
  alert('회원가입이 완료되었습니다! 로그인해 주세요.');
  toggle();
}

function handleLogin(event) {
  event.preventDefault(); 
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const users = JSON.parse(localStorage.getItem('users')) || [];
  const user = users.find(u => u.email === email && u.password === password);

  if (user) {
    sessionStorage.setItem('isLoggedIn', 'true');
    sessionStorage.setItem('userName', user.name);
    alert(`${user.name}님, 환영합니다!`);
    location.href = 'workspace.html'; 
  } else {
    alert('이메일 또는 비밀번호가 올바르지 않습니다.');
  }
}
</script>
</body>
</html>
